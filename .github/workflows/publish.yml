name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write   # required for Trusted Publishing
      contents: write   # required to create GitHub Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for uv-dynamic-versioning to read git tags

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uvx hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/ # delete after tests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true  # auto-generates from merged PRs/commits
          files: dist/*